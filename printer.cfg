# =======================
# Ender 3 Pro - SKR Mini E3 V2
# Sprite Extruder, BLTouch, Stock 12864 LCD
# Mainsail ready config
# =======================

[include mainsail.cfg]

# ---------------- X AXIS ----------------
[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_min: 0
position_endstop: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

# ---------------- Y AXIS ----------------
[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

# ---------------- Z AXIS ----------------
[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 250

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

# ---------------- BLTOUCH ----------------
[bltouch]
sensor_pin: ^PC14
control_pin: PA1
x_offset: -32
y_offset: -42
#z_offset: 3.100  # Calibrate with PROBE_CALIBRATE
probe_with_touch_mode: true
stow_on_each_sample: false


[safe_z_home]
# nozzle goes to (142,152) so probe ends at (110,110)
home_xy_position: 149.5,159.5
speed: 50
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 32, 42    # nozzle Y=42 → probe Y=0
mesh_max: 200, 193
probe_count: 5,5
fade_start: 1
fade_end: 10
fade_target: 0
algorithm: bicubic

# ---------------- EXTRUDER ----------------
[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
gear_ratio: 42:12
rotation_distance: 26.53   # Sprite default, calibrate with extrusion test
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 260
max_extrude_only_distance: 120
pressure_advance: 0.080

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
stealthchop_threshold: 999999

# ---------------- BED HEATER ----------------
[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC3
#control: pid
#pid_Kp: 54.027
#pid_Ki: 0.770
#pid_Kd: 948.182
min_temp: 0
max_temp: 130

# ---------------- FANS ----------------
[heater_fan heatbreak_cooling_fan]
pin: PC7

[fan]
pin: PC6

# ---------------- DISPLAY ----------------
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

[display]
lcd_type: st7920
cs_pin: EXP1_7
sclk_pin: EXP1_6
sid_pin: EXP1_8
encoder_pins: ^EXP1_5, ^EXP1_3
click_pin: ^!EXP1_2

[output_pin beeper]
pin: EXP1_1

[input_shaper]
shaper_type: mzv
shaper_freq_x: 40
shaper_freq_y: 40



# ---------------- MCU ----------------
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_38FFD9053046413030581143-if00

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[static_digital_output usb_pullup_enable]
pins: !PA14

# ---------------- MAINTENANCE ----------------
[save_variables]
filename: ~/printer_data/config/variables.cfg

[virtual_sdcard]
path: ~/printer_data/gcodes

[pause_resume]
recover_velocity: 50

[respond]
default_type: echo

# ---------------- MACROS ----------------
[gcode_macro G29]
gcode:
    # Full bed mesh calibration
    BED_MESH_CLEAR
    G28
    BED_MESH_CALIBRATE
    SAVE_CONFIG

[gcode_macro START_PRINT]
gcode:
    ; ----- Reset extruder and home axes -----
    G92 E0
    G28
    ; ----- Load saved bed mesh -----
    BED_MESH_PROFILE LOAD=default

    ; ----- Lift nozzle slightly -----
    G1 Z5.0 F3000


    ; ----- Move nozzle slightly up to avoid scratching -----
    G1 Z2.0 F3000

    ; ----- Prime lines -----
    G1 X0.1 Y20 Z0.3 F5000.0
    G1 X0.1 Y200.0 Z0.3 F1500.0 E15
    G1 X0.4 Y200.0 Z0.3 F5000.0
    G1 X0.4 Y20 Z0.3 F1500.0 E30
    G92 E0            ; Reset extruder

    ; ----- Move to start position -----
    G1 Z2.0 F3000
    G1 X5 Y20 Z0.3 F5000.0

[gcode_macro END_PRINT]
gcode:
    ; ----- Retract and lift -----
    G91                 ; Relative positioning
    G1 E-2 F2700        ; Retract filament
    G1 E-2 Z0.2 F2400   ; Retract and raise Z
    G1 X5 Y5 F3000      ; Wipe out
    G1 Z10              ; Raise Z more
    G90                 ; Absolute positioning

    ; ----- Move bed/nozzle to safe position -----
    G1 X110 Y235 F3000

    ; ----- Turn off heaters and fan -----
    M106 S0             ; Turn off fan
    M104 S0             ; Turn off hotend
    M140 S0             ; Turn off bed

    ; ----- Disable steppers except Z -----
    M84 X Y E

